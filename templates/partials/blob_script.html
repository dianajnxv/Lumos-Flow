<script>
const canvas = document.getElementById('auth-blobs');
const ctx = canvas.getContext('2d');
function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
resize();
window.addEventListener('resize', resize);

function getBlobColors() {
    const body = document.body;
    if (body.classList.contains('dark-theme'))
        return ['#3A3A3C','#5A5A5C','#8E705A','#4A4A4C','#2C2C2E','#6B5347'];
    if (body.classList.contains('motivational-theme'))
        return ['#FF9500','#8E705A','#C4834A','#FF9500','#8E705A','#C4834A'];
    return ['#3A3A3C','#86868B','#5A5A5C','#8E705A','#1D1D1F','#6B5347'];
}
const colors = getBlobColors();
const blobs = Array.from({length: 6}, (_, i) => ({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    r: 120 + Math.random() * 120,
    vx: (Math.random() - 0.5) * 0.5,
    vy: (Math.random() - 0.5) * 0.5,
    color: colors[i]
}));

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    blobs.forEach(b => {
        b.x += b.vx; b.y += b.vy;
        if (b.x < -b.r) b.x = canvas.width + b.r;
        if (b.x > canvas.width + b.r) b.x = -b.r;
        if (b.y < -b.r) b.y = canvas.height + b.r;
        if (b.y > canvas.height + b.r) b.y = -b.r;
        const g = ctx.createRadialGradient(b.x, b.y, 0, b.x, b.y, b.r);
        g.addColorStop(0, b.color + 'cc');
        g.addColorStop(1, b.color + '00');
        ctx.fillStyle = g;
        ctx.beginPath();
        ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
        ctx.fill();
    });
    requestAnimationFrame(draw);
}
draw();
</script>
