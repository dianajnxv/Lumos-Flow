{% extends 'master.html' %}
{% block title %}Reset Password{% endblock %}

{% block content %}
<div class="auth-page">
    <canvas id="auth-blobs"></canvas>
    <div class="form-container">
        <form class="form active" method="post">
            <h2 style="margin-bottom: 0.5rem; font-weight: 700; color: var(--text-color);">Forgot Password?</h2>
            <p style="color: var(--description-color); font-size: 0.9rem; margin-bottom: 1.5rem;">
                Enter your email and we'll send you a reset link.
            </p>
            {% csrf_token %}
            <div class="form-group">
                <label class="form-group label">Email</label>
                <input type="email" name="email" class="form-group input" required placeholder="your@email.com"/>
            </div>
            <div class="mt-3">
                <button type="submit" class="btn-submit">Send Reset Link</button>
            </div>
            <p class="form-switch mt-3">
                Remember your password? <a href="{% url 'login' %}">Login here</a>
            </p>
        </form>
    </div>
</div>
{% include 'partials/blob_script.html' %}
{% endblock %}
