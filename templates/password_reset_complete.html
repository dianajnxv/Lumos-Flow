{% extends 'master.html' %}
{% block title %}Password Reset Complete{% endblock %}

{% block content %}
<div class="auth-page">
    <canvas id="auth-blobs"></canvas>
    <div class="form-container">
        <div class="form active text-center">
            <h2 style="margin-bottom: 0.5rem; font-weight: 700; color: var(--text-color);">Password Reset!</h2>
            <p style="color: var(--description-color); font-size: 0.9rem; margin-bottom: 1.5rem;">
                Your password has been set. You can now log in with your new password.
            </p>
            <a href="{% url 'login' %}" class="btn-submit" style="text-decoration: none; text-align: center; display: block;">
                Login
            </a>
        </div>
    </div>
</div>
{% include 'partials/blob_script.html' %}
{% endblock %}
